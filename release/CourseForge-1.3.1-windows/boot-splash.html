<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Starting CourseForge...</title>
  <style>
    :root {
      color-scheme: light;
      --bg0: #0f172a;
      --bg1: #1e293b;
      --panel: rgba(255, 255, 255, 0.92);
      --ink: #0f172a;
      --muted: #475569;
      --accent: #0ea5e9;
      --accent-2: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at 20% 20%, #1d4ed8 0%, transparent 40%),
                  radial-gradient(circle at 85% 15%, #0891b2 0%, transparent 45%),
                  linear-gradient(135deg, var(--bg0), var(--bg1));
      color: var(--ink);
      overflow: hidden;
    }

    .panel {
      width: min(560px, 92vw);
      background: var(--panel);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 30px 60px rgba(2, 6, 23, 0.35);
      animation: rise 450ms ease-out;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .status {
      font-weight: 600;
      color: #0f766e;
      min-height: 1.4em;
    }

    .bar {
      margin-top: 12px;
      width: 100%;
      height: 12px;
      background: #dbeafe;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      width: 6%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
      transition: width 280ms ease;
    }

    .meta {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #64748b;
    }

    .stats {
      margin-top: 10px;
      font-size: 0.83rem;
      color: #334155;
      display: grid;
      gap: 4px;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .stats-row span:first-child {
      color: #64748b;
    }

    @keyframes rise {
      from {
        transform: translateY(8px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="panel" role="status" aria-live="polite">
    <h1>Starting CourseForge</h1>
    <p id="phase" class="status">Preparing launch sequence...</p>
    <div class="bar" aria-label="Startup progress">
      <div id="fill" class="fill"></div>
    </div>
    <p id="details" class="meta">This should take only a few seconds.</p>
    <div id="stats" class="stats" hidden>
      <div class="stats-row"><span>Update state</span><strong id="stat-state">-</strong></div>
      <div class="stats-row"><span>Progress</span><strong id="stat-progress">-</strong></div>
      <div class="stats-row"><span>Downloaded</span><strong id="stat-bytes">-</strong></div>
      <div class="stats-row"><span>Download speed</span><strong id="stat-speed">-</strong></div>
      <div class="stats-row"><span>Changed files</span><strong id="stat-files">-</strong></div>
    </div>
  </main>

  <script>
    (function () {
      const targetUrl = "__TARGET_URL__";
      const phaseEl = document.getElementById("phase");
      const detailsEl = document.getElementById("details");
      const fillEl = document.getElementById("fill");
      const statsEl = document.getElementById("stats");
      const statStateEl = document.getElementById("stat-state");
      const statProgressEl = document.getElementById("stat-progress");
      const statBytesEl = document.getElementById("stat-bytes");
      const statSpeedEl = document.getElementById("stat-speed");
      const statFilesEl = document.getElementById("stat-files");
      let localProgress = 8;

      function formatBytes(bytes) {
        if (typeof bytes !== "number" || !Number.isFinite(bytes) || bytes < 0) {
          return "-";
        }
        if (bytes < 1024) {
          return bytes + " B";
        }
        const units = ["KB", "MB", "GB"];
        let value = bytes / 1024;
        let unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
          value /= 1024;
          unit += 1;
        }
        return value.toFixed(value >= 10 ? 0 : 1) + " " + units[unit];
      }

      function formatState(state) {
        if (!state) return "-";
        return String(state).replace(/-/g, " ");
      }

      function isUpdateActive(progress) {
        const activeStates = new Set(["checking", "update-available", "downloading", "extracting", "staging", "staged"]);
        return Boolean(progress && activeStates.has(String(progress.state || "")));
      }

      function renderUpdaterStats(progress) {
        if (!progress || (!progress.state && typeof progress.progressPercent !== "number")) {
          statsEl.hidden = true;
          return;
        }

        statsEl.hidden = false;
        statStateEl.textContent = formatState(progress.state);
        if (typeof progress.progressPercent === "number") {
          statProgressEl.textContent = Math.max(0, Math.min(100, progress.progressPercent)) + "%";
        } else {
          statProgressEl.textContent = "-";
        }

        const downloadedText = typeof progress.bytesDownloaded === "number"
          ? formatBytes(progress.bytesDownloaded)
          : "-";
        const sizeText = typeof progress.assetSizeBytes === "number"
          ? formatBytes(progress.assetSizeBytes)
          : null;
        statBytesEl.textContent = sizeText ? (downloadedText + " / " + sizeText) : downloadedText;

        if (typeof progress.downloadSpeedBytesPerSecond === "number" && progress.downloadSpeedBytesPerSecond >= 0) {
          statSpeedEl.textContent = formatBytes(progress.downloadSpeedBytesPerSecond) + "/s";
        } else {
          statSpeedEl.textContent = "-";
        }

        if (typeof progress.filesPlanned === "number") {
          const total = typeof progress.filesTotal === "number" ? progress.filesTotal : null;
          statFilesEl.textContent = total !== null ? (progress.filesPlanned + " planned of " + total) : (String(progress.filesPlanned));
        } else {
          statFilesEl.textContent = "-";
        }
      }

      function setProgress(nextValue) {
        localProgress = Math.max(localProgress, Math.min(100, nextValue));
        fillEl.style.width = localProgress + "%";
      }

      function setStatus(message, details) {
        if (message) {
          phaseEl.textContent = message;
        }
        if (details) {
          detailsEl.textContent = details;
        }
      }

      async function poll() {
        try {
          const [bootResponse, updaterResponse] = await Promise.all([
            fetch(targetUrl + "/api/boot-status", { cache: "no-store" }),
            fetch(targetUrl + "/api/updater-progress", { cache: "no-store" }),
          ]);

          let updater = null;
          if (updaterResponse.ok) {
            updater = await updaterResponse.json();
            renderUpdaterStats(updater);
            if (typeof updater.progressPercent === "number") {
              setProgress(Math.max(localProgress, updater.progressPercent));
            }
            if (updater.message) {
              setStatus(updater.message, "Applying update telemetry from local updater...");
            }
          }

          if (bootResponse.ok) {
            const boot = await bootResponse.json();
            if (typeof boot.progressPercent === "number") {
              setProgress(boot.progressPercent);
            } else {
              setProgress(Math.min(95, localProgress + 2));
            }

            setStatus(boot.message || "Starting local server...", boot.step ? "Step: " + boot.step : "Preparing app session...");
            if (boot.ready && !isUpdateActive(updater)) {
              setProgress(100);
              setStatus("CourseForge is ready", "Redirecting now...");
              window.location.replace(targetUrl);
              return;
            }
            if (boot.ready && isUpdateActive(updater)) {
              setStatus("CourseForge is ready", "Finishing update checks before redirect...");
            }
          }

          const updateResponse = await fetch(targetUrl + "/api/update-status", { cache: "no-store" });
          if (updateResponse.ok && !isUpdateActive(updater)) {
            setProgress(100);
            setStatus("CourseForge is ready", "Redirecting now...");
            window.location.replace(targetUrl);
            return;
          }
        } catch {
          setProgress(Math.min(92, localProgress + 3));
          setStatus("Starting local server...", "Waiting for server readiness...");
        }

        window.setTimeout(poll, 450);
      }

      setProgress(12);
      poll();
    })();
  </script>
</body>
</html>
